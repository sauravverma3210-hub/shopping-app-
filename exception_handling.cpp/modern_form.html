<!DOCTYPE html>
<html>
<head>
  <title>Modern Form</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

  </style>
</head>

<body>

  <div class="form-container">

    <h2>Sign Up</h2>

    <form>

      <input type="text" placeholder="Enter Name" required>

      <input type="email" placeholder="Enter Email" required>

      <input type="password" placeholder="Enter Password" required>

      <select>
        <option>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <button type="submit">Login</button>

    </form>

  </div>

</body>
</html>
